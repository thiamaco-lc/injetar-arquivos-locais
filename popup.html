<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Injetar Arquivos</title>

  <style>
    :root {
      --bg: #1f2023;
      --panel: #2a2c30;
      --panel-2: #34373c;
      --border: #3d4147;
      --txt: #e8eaed;
      --txt-dim: #9aa0a6;
      --accent: #3b82f6;
      --green: #10b981;
      --red: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      padding: 12px;
      width: 520px;
      background: var(--bg);
      color: var(--txt);
      font-size: 13px;
      margin: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .topbar h1 {
      font-size: 14px;
      margin: 0;
      flex: 1;
      font-weight: 600;
    }

    .files {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
      max-height: 360px;
      overflow-y: auto;
      border: 1px solid var(--border);
      padding: 8px;
      border-radius: 8px;
      background: var(--panel);
    }
    .files:empty::after {
      content: "Nenhum arquivo. Clique em “+ Campo”.";
      color: var(--txt-dim);
      font-style: italic;
      padding: 8px;
    }

    .file-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
    }
    .file-row.dragging { opacity: 0.45; }

    .drag-handle {
      cursor: grab;
      color: var(--txt-dim);
      user-select: none;
      font-size: 15px;
      line-height: 1;
      padding: 0 2px;
    }
    .drag-handle:active { cursor: grabbing; }

    .type-badge {
      min-width: 42px;
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 6px;
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
      color: #fff;
      background: #6b7280;
    }
    .type-badge[data-tipo="css"] { background: #2563eb; }
    .type-badge[data-tipo="js"]  { background: #ca8a04; }
    .type-badge[data-tipo="html"]{ background: #dc2626; }
    .type-badge[data-tipo=""]    { background: #6b7280; }

    input[type="text"], select {
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 13px;
      background: #202225;
      color: var(--txt);
      transition: border-color 0.15s;
    }
    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(59,130,246,0.35);
    }

    .file-url { flex: 1; min-width: 140px; }
    .file-url.local { color: var(--green); font-style: italic; }

    .icon-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--txt-dim);
      border-radius: 4px;
      cursor: pointer;
      padding: 5px 7px;
      font-size: 13px;
      line-height: 1;
    }
    .icon-btn:hover { color: var(--txt); border-color: var(--accent); }
    .remove-btn { color: var(--red); border-color: transparent; font-size: 16px; }
    .remove-btn:hover { border-color: var(--red); }

    /* Opções de HTML (seletor + posição) — ocupam a linha inteira */
    .html-opts {
      flex-basis: 100%;
      display: flex;
      gap: 8px;
      align-items: center;
      padding-top: 2px;
    }
    .html-opts .html-selector { flex: 1; }
    .html-opts label { color: var(--txt-dim); font-size: 11px; }
    .html-opts.hidden { display: none; }

    /* Toggle */
    .toggle { display: inline-flex; align-items: center; cursor: pointer; }
    .toggle input {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0;
    }
    .toggle .track {
      position: relative; width: 40px; height: 22px;
      background: #4b5563; border-radius: 9999px; transition: background 0.2s;
    }
    .toggle input:checked + .track { background: var(--accent); }
    .toggle input:focus + .track { box-shadow: 0 0 0 3px rgba(59,130,246,0.4); }
    .toggle .track::after {
      content: ""; position: absolute; top: 2px; left: 2px;
      width: 18px; height: 18px; background: #fff; border-radius: 9999px;
      transition: transform 0.2s;
    }
    .toggle input:checked + .track::after { transform: translateX(18px); }
    .toggle-label { margin-left: 6px; color: var(--txt-dim); font-size: 12px; }

    .config {
      display: flex;
      flex-direction: column;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 12px;
      background: var(--panel);
    }
    .config-row { display: flex; align-items: center; gap: 8px; }
    .config-row .base { flex: 1; }
    .config-row .spacer { flex: 1; }
    .interval-box { display: flex; align-items: center; gap: 4px; color: var(--txt-dim); }
    .interval-box input { width: 64px; }

    .actions { display: flex; gap: 10px; }
    button.primary, button.secondary {
      flex: 1; padding: 10px 0; font-weight: 600; font-size: 13px;
      border-radius: 6px; border: none; cursor: pointer; color: #fff;
      transition: filter 0.15s;
    }
    button.primary { background: var(--accent); }
    button.secondary { background: var(--green); }
    button.primary:hover, button.secondary:hover { filter: brightness(1.1); }
    button:active { filter: brightness(0.9); }

    .hint { color: var(--txt-dim); font-size: 11px; margin: 2px 0 0; }
    #status { min-height: 15px; margin-top: 6px; font-weight: 600; }
    #status.warn { color: #f59e0b; }
    #status.err { color: var(--red); }
    #status.ok { color: var(--green); }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Injetar Arquivos</h1>
    <label class="toggle" title="Liga/desliga todas as injeções">
      <input type="checkbox" id="master-toggle" checked>
      <div class="track"></div>
    </label>
    <span class="toggle-label">Ativo</span>
  </div>

  <div class="files" id="files-container"></div>

  <div class="config">
    <div class="config-row">
      <input class="base" id="base-domain" type="text" placeholder="Domínio base (ex: http://localhost:3000)">
      <button class="icon-btn" id="use-tab" title="Usar o domínio da aba atual">🎯</button>
    </div>
    <div class="config-row">
      <label class="toggle" title="Reinjetar automaticamente ao abrir/atualizar páginas do domínio">
        <input type="checkbox" id="auto-inject" checked>
        <div class="track"></div>
      </label>
      <span class="toggle-label">Auto-injetar no domínio</span>
      <div class="spacer"></div>
    </div>
    <div class="config-row">
      <label class="toggle" title="Recarrega/atualiza quando o gulp recompilar os arquivos">
        <input type="checkbox" id="auto-reload">
        <div class="track"></div>
      </label>
      <span class="toggle-label">Auto-reload (gulp)</span>
      <div class="spacer"></div>
      <div class="interval-box">
        <span>a cada</span>
        <input type="text" id="intervalo" value="1000">
        <span>ms</span>
      </div>
    </div>
    <p class="hint">Auto-reload vigia as URLs http(s): troca o CSS a quente e recarrega a página para JS/HTML.</p>
  </div>

  <div class="actions">
    <button class="secondary" id="add">+ Campo</button>
    <button class="primary" id="apply">Aplicar agora</button>
  </div>
  <p class="hint" id="status"></p>

  <script src="jquery.js"></script>
  <script src="popup.js"></script>
</body>
</html>
